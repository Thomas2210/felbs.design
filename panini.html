<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini Tausch – felbs.design</title>

<style>
body {
  font-family: 'Roboto', sans-serif;
  margin:0;
  background:#fff;
  color:#000;
}

header {
  background:#fff;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

header img {
  height:50px;
}

.container {
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

h1 {
  font-family:'Ubuntu', sans-serif;
  text-align:center;
  margin-bottom:25px;
}

.box {
  border:2px solid #98a8cd;
  border-radius:8px;
  padding:15px;
  margin-bottom:15px;
}

.box h2 {
  font-family:'Ubuntu', sans-serif;
  margin-bottom:8px;
}

textarea {
  width:100%;
  height:100px;
  padding:10px;
  font-size:1rem;
  border:1px solid #ccc;
  border-radius:5px;
}

button {
  width:100%;
  padding:12px;
  background:#98a8cd;
  color:white;
  border:none;
  cursor:pointer;
  font-family:'Ubuntu', sans-serif;
  font-size:1rem;
  margin-top:10px;
}

button:hover {
  background:#8794b8;
}

.result {
  margin-top:25px;
  background:#f5f5f5;
  padding:15px;
  border-radius:8px;
}

.title {
  font-family:'Ubuntu', sans-serif;
}
</style>
</head>

<body>

<header>
  <img src="logo.png" alt="Logo">
</header>

<div class="container">

<h1>Panini Tausch System</h1>

<!-- HOST -->
<div class="box">
  <h2>Ich (Host) habe doppelt</h2>
  <textarea id="hostHave">1, 2, 2, 5, 10, 10, 15</textarea>
</div>

<div class="box">
  <h2>Ich (Host) brauche</h2>
  <textarea id="hostNeed">3, 4, 6, 7, 8</textarea>
</div>

<hr>

<!-- FREUND -->
<div class="box">
  <h2>Freund hat doppelt</h2>
  <textarea id="friendHave">3, 5, 8, 10, 12</textarea>
</div>

<div class="box">
  <h2>Freund braucht</h2>
  <textarea id="friendNeed">1, 2, 7, 10</textarea>
</div>

<button onclick="calc()">Abgleich starten</button>

<div class="result" id="out"></div>

</div>

<script>
function parse(input) {
  return (input.match(/\d+/g) || []).map(Number);
}

function calc() {

  // HOST
  const hostHave = parse(document.getElementById('hostHave').value);
  const hostNeed = parse(document.getElementById('hostNeed').value);

  // FRIEND
  const friendHave = parse(document.getElementById('friendHave').value);
  const friendNeed = parse(document.getElementById('friendNeed').value);

  // Häufigkeiten Host
  const hostCount = {};
  hostHave.forEach(n => hostCount[n] = (hostCount[n] || 0) + 1);
  const hostDup = Object.keys(hostCount)
    .filter(n => hostCount[n] > 1)
    .map(Number);

  // Häufigkeiten Freund
  const friendCount = {};
  friendHave.forEach(n => friendCount[n] = (friendCount[n] || 0) + 1);
  const friendDup = Object.keys(friendCount)
    .filter(n => friendCount[n] > 1)
    .map(Number);

  // Abgleich
  const friendToHost = friendDup.filter(n => hostNeed.includes(n));
  const hostToFriend = hostDup.filter(n => friendNeed.includes(n));

  document.getElementById('out').innerHTML = `

    <div class="title"><strong>DU kannst vom Freund bekommen:</strong></div>
    ${friendToHost.length ? friendToHost.join(", ") : "Nichts"}<br><br>

    <div class="title"><strong>Freund kann von dir bekommen:</strong></div>
    ${hostToFriend.length ? hostToFriend.join(", ") : "Nichts"}<br><br>

    <hr>

    <div class="title"><strong>Deine doppelten:</strong></div>
    ${hostDup.length ? hostDup.join(", ") : "Keine"}<br><br>

    <div class="title"><strong>Freund doppelt:</strong></div>
    ${friendDup.length ? friendDup.join(", ") : "Keine"}

  `;
}
</script>

</body>
</html>
