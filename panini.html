<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini Tausch – felbs.design</title>

<style>
body {
  font-family: 'Roboto', sans-serif;
  margin:0;
  background:#fff;
  color:#000;
}

header {
  background:#fff;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

header img {
  height:50px;
}

.container {
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

h1 {
  font-family:'Ubuntu', sans-serif;
  text-align:center;
  margin-bottom:25px;
}

.box {
  border:2px solid #98a8cd;
  border-radius:8px;
  padding:15px;
  margin-bottom:15px;
}

.box h2 {
  font-family:'Ubuntu', sans-serif;
  margin-bottom:8px;
}

textarea {
  width:100%;
  height:110px;
  padding:10px;
  font-size:1rem;
  border:1px solid #ccc;
  border-radius:5px;
}

button {
  width:100%;
  padding:12px;
  background:#98a8cd;
  color:white;
  border:none;
  cursor:pointer;
  font-family:'Ubuntu', sans-serif;
  font-size:1rem;
  margin-top:10px;
}

button:hover {
  background:#8794b8;
}

.result {
  margin-top:25px;
  background:#f5f5f5;
  padding:15px;
  border-radius:8px;
}

.title {
  font-family:'Ubuntu', sans-serif;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <a href="https://www.felbsdesign.at">
    <img src="logo.png" alt="Logo">
  </a>
</header>

<div class="container">

<h1>Panini Tausch System</h1>

<!-- FREUND INPUT -->
<div class="box">
  <h2>Freund hat doppelt</h2>
  <textarea id="friendHave" placeholder="z.B. 1, 5, 5, 10, 12"></textarea>
</div>

<div class="box">
  <h2>Freund braucht</h2>
  <textarea id="friendNeed" placeholder="z.B. 2, 3, 7, 10"></textarea>
</div>

<button onclick="calc()">Abgleich starten</button>

<div class="result" id="out"></div>

</div>

<script>
/* ===== DEINE FIXEN DATEN ===== */
const HOST_HAVE = [1, 2, 2, 5, 10, 10, 15, 20];
const HOST_NEED = [3, 4, 6, 7, 8, 9];

function parse(input) {
  return (input.match(/\d+/g) || []).map(Number);
}

function calc() {

  // FREUND
  const friendHave = parse(document.getElementById('friendHave').value);
  const friendNeed = parse(document.getElementById('friendNeed').value);

  // HOST doppelte berechnen
  const hostCount = {};
  HOST_HAVE.forEach(n => hostCount[n] = (hostCount[n] || 0) + 1);

  const hostDup = Object.keys(hostCount)
    .filter(n => hostCount[n] > 1)
    .map(Number);

  // FREUND doppelte berechnen
  const friendCount = {};
  friendHave.forEach(n => friendCount[n] = (friendCount[n] || 0) + 1);

  const friendDup = Object.keys(friendCount)
    .filter(n => friendCount[n] > 1)
    .map(Number);

  // Abgleich:
  // Freund → Host
  const friendToHost = friendDup.filter(n => HOST_NEED.includes(n));

  // Host → Freund
  const hostToFriend = hostDup.filter(n => friendNeed.includes(n));

  document.getElementById('out').innerHTML = `

    <div class="title">DU bekommst vom Freund:</div>
    ${friendToHost.length ? friendToHost.join(", ") : "Nichts"}<br><br>

    <div class="title">DU gibst dem Freund:</div>
    ${hostToFriend.length ? hostToFriend.join(", ") : "Nichts"}<br><br>

    <hr>

    <div class="title">Deine doppelten (fix):</div>
    ${hostDup.length ? hostDup.join(", ") : "Keine"}<br><br>

    <div class="title">Deine fehlenden (fix):</div>
    ${HOST_NEED.join(", ")}

  `;
}
</script>

</body>
</html>
