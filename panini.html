<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini Tausch – felbs.design</title>

<style>
body {
  font-family: 'Roboto', sans-serif;
  margin:0;
  background:#fff;
  color:#000;
}

header {
  background:#fff;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

header img {
  height:50px;
}

.container {
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

h1 {
  font-family:'Ubuntu', sans-serif;
  text-align:center;
  margin-bottom:10px;
}

.intro {
  text-align:center;
  margin-bottom:25px;
  color:#444;
}

.box {
  border:2px solid #98a8cd;
  border-radius:8px;
  padding:15px;
  margin-bottom:15px;
}

.box h2 {
  font-family:'Ubuntu', sans-serif;
  margin-bottom:5px;
}

.box p {
  font-size:0.9rem;
  color:#555;
  margin-bottom:10px;
}

textarea {
  width:100%;
  height:110px;
  padding:10px;
  font-size:1rem;
  border:1px solid #ccc;
  border-radius:5px;
}

button {
  width:100%;
  padding:12px;
  background:#98a8cd;
  color:white;
  border:none;
  cursor:pointer;
  font-family:'Ubuntu', sans-serif;
  font-size:1rem;
  margin-top:10px;
}

button:hover {
  background:#8794b8;
}

.result {
  margin-top:25px;
  background:#f5f5f5;
  padding:15px;
  border-radius:8px;
}

.title {
  font-family:'Ubuntu', sans-serif;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <a href="https://www.felbsdesign.at">
    <img src="logo.png" alt="Logo">
  </a>
</header>

<div class="container">

<h1>Panini Tausch mit mir</h1>

<div class="intro">
  Gib einfach deine Sticker ein und sieh sofort, was du mit mir tauschen kannst.
</div>

<!-- FREUND INPUT -->
<div class="box">
  <h2>1. Welche Sticker hast du doppelt?</h2>
  <p>Diese kannst du mir anbieten.</p>
  <textarea id="friendHave" placeholder="z.B. 1, 5, 5, 10, 12"></textarea>
</div>

<div class="box">
  <h2>2. Welche Sticker brauchst du noch?</h2>
  <p>Diese versuche ich dir zu geben.</p>
  <textarea id="friendNeed" placeholder="z.B. 2, 3, 7, 10"></textarea>
</div>

<button onclick="calc()">Tausch anzeigen</button>

<div class="result" id="out"></div>

</div>

<script>
/* ===== FIXE DATEN (MEINE STICKER) ===== */
const HOST_HAVE = [1, 2, 2, 5, 10, 10, 15, 20];
const HOST_NEED = [3, 4, 6, 7, 8, 9];

function parse(input) {
  return (input.match(/\d+/g) || []).map(Number);
}

function calc() {

  const friendHave = parse(document.getElementById('friendHave').value);
  const friendNeed = parse(document.getElementById('friendNeed').value);

  // meine doppelten
  const hostCount = {};
  HOST_HAVE.forEach(n => hostCount[n] = (hostCount[n] || 0) + 1);

  const hostDup = Object.keys(hostCount)
    .filter(n => hostCount[n] > 1)
    .map(Number);

  // freund doppelte
  const friendCount = {};
  friendHave.forEach(n => friendCount[n] = (friendCount[n] || 0) + 1);

  const friendDup = Object.keys(friendCount)
    .filter(n => friendCount[n] > 1)
    .map(Number);

  // Tauschlogik
  const friendGets = friendDup.filter(n => HOST_NEED.includes(n));
  const friendGives = hostDup.filter(n => friendNeed.includes(n));

  document.getElementById('out').innerHTML = `

    <div class="title">👉 Das kannst du MIR geben:</div>
    ${friendDup.length ? friendDup.join(", ") : "Keine doppelten Sticker"}<br><br>

    <div class="title">🎁 Das bekommst du von mir:</div>
    ${friendGives.length ? friendGives.join(", ") : "Aktuell nichts Passendes"}<br><br>

    <hr>

    <div class="title">📌 Was ich suche:</div>
    ${HOST_NEED.join(", ")}<br><br>

    <div class="title">📌 Meine Tausch-Sticker:</div>
    ${hostDupList(hostDup)}

  `;
}

/* kleine Anzeigehilfe */
function hostDupList(arr){
  return arr.length ? arr.join(", ") : "Keine";
}
</script>

</body>
</html>
