<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panini Tausch – felbs.design</title>

<style>
body {
  font-family: 'Roboto', sans-serif;
  margin:0;
  background:#fff;
  color:#000;
}

header {
  background:#fff;
  padding:15px;
  text-align:center;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

header img {
  height:50px;
}

.container {
  max-width:900px;
  margin:30px auto;
  padding:20px;
}

h1 {
  font-family:'Ubuntu', sans-serif;
  text-align:center;
  margin-bottom:10px;
}

.intro {
  text-align:center;
  margin-bottom:25px;
  color:#444;
}

.box {
  border:2px solid #98a8cd;
  border-radius:8px;
  padding:15px;
  margin-bottom:15px;
}

.box h2 {
  font-family:'Ubuntu', sans-serif;
  margin-bottom:5px;
}

.box p {
  font-size:0.9rem;
  color:#555;
  margin-bottom:10px;
}

textarea {
  width:100%;
  height:110px;
  padding:10px;
  font-size:1rem;
  border:1px solid #ccc;
  border-radius:5px;
}

button {
  width:100%;
  padding:12px;
  background:#98a8cd;
  color:white;
  border:none;
  cursor:pointer;
  font-family:'Ubuntu', sans-serif;
  font-size:1rem;
  margin-top:10px;
}

button:hover {
  background:#8794b8;
}

.result {
  margin-top:25px;
  background:#f5f5f5;
  padding:15px;
  border-radius:8px;
}

.title {
  font-family:'Ubuntu', sans-serif;
  font-weight:500;
}
</style>
</head>

<body>

<header>
  <a href="https://www.felbsdesign.at">
    <img src="logo.png" alt="Logo">
  </a>
</header>

<div class="container">

<h1>Panini Tausch mit mir</h1>

<div class="intro">
  Gib deine Sticker ein und sieh sofort, was du mit mir tauschen kannst.
</div>

<!-- FREUND INPUT -->
<div class="box">
  <h2>Welche Sticker hast du doppelt?</h2>
  <p>Diese kannst du mir anbieten.</p>
  <textarea id="friendHave" placeholder="z.B. 1, 5, 5, 10, 12"></textarea>
</div>

<div class="box">
  <h2>Welche Sticker brauchst du noch?</h2>
  <p>Optional – dient nur zur besseren Empfehlung.</p>
  <textarea id="friendNeed" placeholder="z.B. 2, 3, 7, 10"></textarea>
</div>

<button onclick="calc()">Tausch anzeigen</button>

<div class="result" id="out"></div>

</div>

<script>

/* ===== DEIN NAME ===== */
const NAME = "Thomas";

/* ===== ALBUM GRÖSSE ===== */
const ALBUM_SIZE = 500;

/* ===== DEINE FIXEN STICKER ===== */
const HOST_HAVE = [1, 2, 2, 5, 10, 10, 15, 20];

/* ===== PARSE ===== */
function parse(input) {
  return (input.match(/\d+/g) || []).map(Number);
}

/* ===== ALBUM HELPER ===== */
function buildFullAlbumMissing(list) {
  const set = new Set(list);
  const missing = [];

  for (let i = 1; i <= ALBUM_SIZE; i++) {
    if (!set.has(i)) missing.push(i);
  }

  return missing;
}

/* ===== MAIN ===== */
function calc() {

  const friendHaveRaw = parse(document.getElementById('friendHave').value);
  const friendNeed = parse(document.getElementById('friendNeed').value);

  /* --- HOST LOGIK --- */

  // doppelte berechnen
  const hostCount = {};
  HOST_HAVE.forEach(n => hostCount[n] = (hostCount[n] || 0) + 1);

  const hostDup = Object.keys(hostCount)
    .filter(n => hostCount[n] > 1)
    .map(Number);

  // fehlende Host Sticker (aus 1–500 gedacht)
  const hostHaveUnique = [...new Set(HOST_HAVE)];
  const hostNeed = buildFullAlbumMissing(hostHaveUnique);

  /* --- FREUND LOGIK --- */

  const friendHaveUnique = [...new Set(friendHaveRaw)];

  const friendCount = {};
  friendHaveRaw.forEach(n => friendCount[n] = (friendCount[n] || 0) + 1);

  const friendDup = Object.keys(friendCount)
    .filter(n => friendCount[n] > 1)
    .map(Number);

  const friendMissing = buildFullAlbumMissing(friendHaveUnique);

  /* --- MATCHING --- */

  const friendToHost = friendDup.filter(n => hostNeed.includes(n));
  const hostToFriend = hostDup.filter(n => friendMissing.includes(n));

  /* --- OUTPUT --- */

  document.getElementById('out').innerHTML = `

    <div class="title">👉 Diese Sticker kannst du ${NAME} geben:</div>
    ${friendToHost.length ? friendToHost.join(", ") : "Keine passenden Treffer"}<br><br>

    <div class="title">🎁 Diese Sticker bekommst du von ${NAME}:</div>
    ${hostToFriend.length ? hostToFriend.join(", ") : "Aktuell keine passenden Treffer"}<br><br>

    <hr>

    <div class="title">📌 ${NAME} sucht noch diese Sticker:</div>
    ${hostNeed.length ? hostNeed.slice(0,50).join(", ") + (hostNeed.length>50?" ...":"") : "Komplett"}<br><br>

    <div class="title">📌 Deine doppelten Sticker:</div>
    ${friendDup.length ? friendDup.join(", ") : "Keine"}

  `;
}

</script>

</body>
</html>
