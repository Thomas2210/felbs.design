<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>

<link rel="icon" href="Bildzeichen.png" type="image/png">

<script>
if (window.location.hash) {
  document.documentElement.classList.add('from-hash');
}
</script>

<style>

/* ===== BASIS ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family: Roboto, sans-serif;
  background:#fff;
  color:#000;
}

/* =========================
   INTRO (FINAL)
========================= */

#intro{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:80px;
  flex-wrap:wrap;
}

/* EIN ELEMENT = Punkt + Box */
.intro-item{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:30px;

  cursor:pointer;
  transform-origin:center;
  transition:0.3s ease;
}

.intro-item:hover{
  transform:scale(1.05);
}

/* Punkt */
.dot{
  width:90px;
  height:90px;
  background:#98a8cd;
  border-radius:50%;
}

/* Box */
.square{
  width:260px;
  height:85px;
  background:#98a8cd;
  color:#fff;

  display:flex;
  justify-content:center;
  align-items:center;

  font-family:'Ubuntu', sans-serif;
  font-size:1.5rem;
}

/* ===== HEADER ===== */
header{
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

nav ul{
  display:flex;
  list-style:none;
  gap:20px;
}

main{
  display:none;
}

main.active{
  display:block;
}

/* ===== TEXT BLAU ===== */
.text-section{
  background:#98a8cd;
  color:#fff;
  padding:40px 20px;
}

/* ===== SLIDER ===== */
.portfolio-slider{
  display:flex;
  gap:10px;
  padding:20px 10px;
}

.slider-container{
  overflow:hidden;
  flex:1;
}

.slider-track{
  display:flex;
  gap:20px;
  scroll-behavior:smooth;
}

.arrow{
  font-size:2rem;
  background:rgba(0,0,0,0.3);
  color:#fff;
  border:none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">

  <div class="intro-item" onclick="showPage('grafik')">
    <div class="dot"></div>
    <div class="square">Grafik</div>
  </div>

  <div class="intro-item" onclick="showPage('print')">
    <div class="dot"></div>
    <div class="square">Print</div>
  </div>

  <div class="intro-item" onclick="showPage('web')">
    <div class="dot"></div>
    <div class="square">Web</div>
  </div>

  <div class="intro-item" onclick="showPage('medien')">
    <div class="dot"></div>
    <div class="square">Medien</div>
  </div>

</div>

<!-- HEADER -->
<header id="main-header" style="display:none;">
  <div class="logo"><img src="logo.png"></div>

  <nav>
    <ul>
      <li><a onclick="openPage('grafik')">Grafik</a></li>
      <li><a onclick="openPage('print')">Print</a></li>
      <li><a onclick="openPage('web')">Web</a></li>
      <li><a onclick="openPage('medien')">Medien</a></li>
    </ul>
  </nav>
</header>

<!-- REST DEINER SEITE BLEIBT 1:1 UNVERÄNDERT -->

<script>
function showPage(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('main-header').style.display='flex';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
