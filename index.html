<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>

<meta name="description" content="Professionelles Grafik-, Print- und Webdesign. Kreative Projekte von Idee bis fertigem Produkt.">
<link rel="icon" href="Bildzeichen.png" type="image/png">

<style>

/* ===== BASIS ===== */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{
  font-family:Roboto, sans-serif;
  background:#fff;
}

/* =========================
   BACKGROUND (LEVEL 2)
========================= */

.bg-symbols{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

/* Base symbol */
.symbol{
  position:absolute;
  width:70px;
  opacity:0.08;
  will-change:transform;
}

/* Depth */
.layer-1{ opacity:0.12; filter:blur(0px); }
.layer-2{ opacity:0.08; filter:blur(1px); }
.layer-3{ opacity:0.05; filter:blur(2px); }

/* Positionen */
.s1{top:10%;left:15%;}
.s2{top:25%;left:70%;}
.s3{top:60%;left:20%;}
.s4{top:75%;left:80%;}
.s5{top:40%;left:45%;}

/* =========================
   INTRO
========================= */

#intro{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:20px;
  flex-wrap:wrap;
  position:relative;
  z-index:2;
}

.square{
  width:150px;
  height:150px;
  background:#98a8cd;
  color:#fff;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
  transition:0.3s;
}

.square:hover{
  transform:scale(1.2);
  background:#8794b8;
}

/* HEADER */
header{
  display:none;
  position:sticky;
  top:0;
  background:#fff;
  z-index:10;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

nav ul{
  display:flex;
  list-style:none;
  gap:20px;
}

main{display:none;}
main.active{display:block;}

/* TEXT SECTION */
.text-section{
  background:#98a8cd;
  color:#fff;
  padding:40px 20px;
}

/* SLIDER */
.portfolio-slider{
  display:flex;
  gap:10px;
  padding:20px;
}

.slider-container{
  flex:1;
  overflow:hidden;
}

.slider-track{
  display:flex;
  gap:20px;
}

.arrow{
  font-size:2rem;
  background:rgba(0,0,0,0.3);
  color:#fff;
  border:none;
}

</style>
</head>

<body>

<!-- BACKGROUND SYMBOLS (LEVEL 2) -->
<div class="bg-symbols">

  <img src="Bildzeichen.png" class="symbol layer-1 s1">
  <img src="Bildzeichen.png" class="symbol layer-2 s2">
  <img src="Bildzeichen.png" class="symbol layer-3 s3">
  <img src="Bildzeichen.png" class="symbol layer-2 s4">
  <img src="Bildzeichen.png" class="symbol layer-1 s5">

</div>

<!-- INTRO -->
<div id="intro">

  <div class="square" onclick="showPage('grafik')">Grafik</div>
  <div class="square" onclick="showPage('print')">Print</div>
  <div class="square" onclick="showPage('web')">Web</div>
  <div class="square" onclick="showPage('medien')">Medien</div>

</div>

<!-- HEADER -->
<header id="main-header">
  <nav>
    <ul>
      <li><a onclick="openPage('grafik')">Grafik</a></li>
      <li><a onclick="openPage('print')">Print</a></li>
      <li><a onclick="openPage('web')">Web</a></li>
      <li><a onclick="openPage('medien')">Medien</a></li>
    </ul>
  </nav>
</header>

<!-- SCRIPTS -->
<script>

function showPage(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('main-header').style.display='block';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
  const el=document.getElementById(page);
  if(el) el.classList.add('active');
}

/* =========================
   LEVEL 2 MOTION ENGINE
========================= */

const symbols = document.querySelectorAll('.symbol');

let mx = 0, my = 0;

document.addEventListener('mousemove', (e)=>{
  mx = (e.clientX / window.innerWidth - 0.5);
  my = (e.clientY / window.innerHeight - 0.5);
});

/* randomness */
const seeds = Array.from(symbols).map(()=>({
  x: Math.random()*1000,
  y: Math.random()*1000,
  s: 0.5 + Math.random()
}));

function noise(t){
  return Math.sin(t) * Math.cos(t*0.5);
}

function animate(){
  const t = Date.now()*0.0003;

  symbols.forEach((el,i)=>{

    const seed = seeds[i];

    const driftX = noise(t + seed.x) * 40;
    const driftY = noise(t + seed.y) * 40;

    const parallaxX = mx * 30 * seed.s;
    const parallaxY = my * 30 * seed.s;

    el.style.transform =
      `translate(${driftX + parallaxX}px, ${driftY + parallaxY}px)`;

  });

  requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
