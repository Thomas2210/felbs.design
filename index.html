<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>
<meta name="description" content="Professionelles Grafik-, Print- und Webdesign. Kreative Projekte von Idee bis fertigem Produkt.">
<link rel="icon" href="Bildzeichen.png" type="image/png">

<script>
if (window.location.hash) {
  document.documentElement.classList.add('from-hash');
}
</script>

<style>

/* ====== LOKALE SCHRIFTEN ====== */
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Regular.ttf') format('truetype');
}

@font-face {
  font-family: 'Ubuntu';
  src: url('fonts/Ubuntu-Medium.ttf') format('truetype');
}

/* ====== BASIS ====== */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: 'Roboto', sans-serif;
  background:#fff;
  color:#000;
}

/* ====== INTRO ====== */
#intro{
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:20px;
  flex-wrap:wrap;
}

.square{
  background:#98a8cd;
  color:#fff;
  font-family:'Ubuntu',sans-serif;
  font-size:1.5rem;

  display:flex;
  justify-content:center;
  align-items:center;

  width:190px;
  height:90px; /* <-- RECHTECK statt Quadrat */

  cursor:pointer;
  transition:0.3s ease;
  text-transform:capitalize;
}

.square:hover{
  transform:scale(1.2);
  background:#8794b8;
}

/* ====== HEADER ====== */
header{
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  position:sticky;
  top:0;
  z-index:10;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* ====== NAV ====== */
nav ul{
  display:flex;
  list-style:none;
  gap:20px;
}

/* ====== SECTIONS ====== */
main{ display:none; }
main.active{ display:block; }

/* ====== TEXT BLAU ====== */
.text-section{
  background:#98a8cd;
  color:#fff;
  padding:40px 20px;
}

/* ====== SLIDER ====== */
.portfolio-slider{
  display:flex;
  gap:10px;
  padding:20px 10px;
}

.slider-container{
  overflow:hidden;
  flex:1;
}

.slider-track{
  display:flex;
  gap:20px;
  scroll-behavior:smooth;
}

/* ====== ARROWS ====== */
.arrow{
  font-size:2rem;
  background:rgba(0,0,0,0.3);
  color:#fff;
  border:none;
}

/* ====== RESPONSIVE ====== */
@media(max-width:768px){
  .square{
    width:170px;
    height:80px;
  }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="square" onclick="showPage('grafik')">Grafik</div>
  <div class="square" onclick="showPage('print')">Print</div>
  <div class="square" onclick="showPage('web')">Web</div>
  <div class="square" onclick="showPage('medien')">Medien</div>
</div>

<!-- HEADER -->
<header id="main-header" style="display:none;">
  <div class="logo"><img src="logo.png"></div>
  <nav>
    <ul>
      <li><a onclick="openPage('grafik')">Grafik</a></li>
      <li><a onclick="openPage('print')">Print</a></li>
      <li><a onclick="openPage('web')">Web</a></li>
      <li><a onclick="openPage('medien')">Medien</a></li>
    </ul>
  </nav>
</header>

<!-- REST 1:1 ORIGINAL BEIBEHALTEN -->
<!-- (Grafik / Print / Web / Medien / Kontakt / JS bleibt exakt wie bei dir) -->

<script>
function showPage(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('main-header').style.display='flex';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
