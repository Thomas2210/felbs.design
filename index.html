<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>
<meta name="description" content="Professionelles Grafik-, Print- und Webdesign. Kreative Projekte von Idee bis fertigem Produkt.">
<link rel="icon" href="Bildzeichen.png" type="image/png">

<script>
if (window.location.hash) {
  document.documentElement.classList.add('from-hash');
}
</script>

<style>

/* ====== LOKALE SCHRIFTEN ====== */
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Regular.ttf') format('truetype');
}

@font-face {
  font-family: 'Ubuntu';
  src: url('fonts/Ubuntu-Medium.ttf') format('truetype');
}

/* ====== BASIS ====== */
* { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family:'Roboto', sans-serif;
  background:#fff;
  color:#000;
}

/* ====== INTRO ====== */
#intro {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:20px;
  flex-wrap:wrap;
}

.square {
  background:#98a8cd;
  color:#fff;
  width:150px;
  height:150px;
  display:flex;
  justify-content:center;
  align-items:center;
  font-family:'Ubuntu';
  cursor:pointer;
  transition:0.3s;
}

.square:hover {
  transform:scale(1.2);
}

/* ====== HEADER ====== */
header {
  position:sticky;
  top:0;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

/* ====== NAV ====== */
nav ul {
  display:flex;
  gap:20px;
  list-style:none;
}

nav a {
  text-decoration:none;
  color:#000;
  font-family:'Ubuntu';
}

nav a:hover {
  background:#98a8cd;
  color:#fff;
}

/* ====== MAIN ====== */
main { display:none; }
main.active { display:block; }

/* ====== TEXT ====== */
.text-section {
  background:#98a8cd;
  color:#fff;
  padding:40px 20px;
  text-align:center;
}

/* ====== PORTFOLIO FIX ====== */
.portfolio-slider {
  display:flex;
  align-items:center;
  position:relative;
  gap:10px;
  padding:0;
}

.portfolio-slider img,
.portfolio-slider video {
  flex:0 0 auto;
  width:33.333%;
  height:auto;
  object-fit:cover;
  border-radius:4px;
  transition:0.3s;
}

/* ====== SLIDER ====== */
.slider-container {
  overflow:hidden;
  flex:1;
}

.slider-track {
  display:flex;
  gap:20px;
}

/* ====== ARROWS ====== */
.arrow {
  font-size:2rem;
  background:rgba(0,0,0,0.3);
  color:#fff;
  border:none;
  cursor:pointer;
}

/* ====== RESPONSIVE ====== */
@media(max-width:768px){
  .portfolio-slider img,
  .portfolio-slider video {
    width:90%;
  }
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="square" onclick="showPage('grafik')">Grafik</div>
  <div class="square" onclick="showPage('print')">Print</div>
  <div class="square" onclick="showPage('web')">Web</div>
  <div class="square" onclick="showPage('medien')">Medien</div>
</div>

<header id="main-header" style="display:none;">
  <nav>
    <ul>
      <li><a href="#" onclick="openPage('grafik')">Grafik</a></li>
      <li><a href="#" onclick="openPage('print')">Print</a></li>
      <li><a href="#" onclick="openPage('web')">Web</a></li>
      <li><a href="#" onclick="openPage('medien')">Medien</a></li>
      <li><a href="#" onclick="openPage('kontakt')">Kontakt</a></li>
    </ul>
  </nav>
</header>

<!-- KONTAKT -->
<main id="kontakt"></main>

<!-- GRAFIK -->
<main id="grafik">
  <section class="text-section">
    <h3>Portfolio</h3>
  </section>

  <div style="background:#fff; padding:0;">
    <div class="portfolio-slider">
      <button class="arrow" onclick="slideLeft('grafik')">&#10094;</button>

      <div class="slider-container" id="container-grafik">
        <div class="slider-track">
          <img src="grafik/grafik1.webp">
          <img src="grafik/grafik2.webp">
          <img src="grafik/grafik3.webp">
        </div>
      </div>

      <button class="arrow" onclick="slideRight('grafik')">&#10095;</button>
    </div>
  </div>
</main>

<!-- PRINT -->
<main id="print">
  <section class="text-section">
    <h3>Portfolio Print</h3>
  </section>

  <div style="background:#fff; padding:0;">
    <div class="portfolio-slider">
      <button class="arrow" onclick="slideLeft('print')">&#10094;</button>

      <div class="slider-container" id="container-print">
        <div class="slider-track">
          <img src="print/print1.webp">
          <img src="print/print2.webp">
          <img src="print/print3.webp">
        </div>
      </div>

      <button class="arrow" onclick="slideRight('print')">&#10095;</button>
    </div>
  </div>
</main>

<!-- WEB -->
<main id="web">
  <section class="text-section">
    <h3>Portfolio Web</h3>
  </section>

  <div style="background:#fff; padding:0;">
    <div class="portfolio-slider">
      <button class="arrow" onclick="slideLeft('web')">&#10094;</button>

      <div class="slider-container" id="container-web">
        <div class="slider-track">
          <img src="web/web1.webp">
          <img src="web/web2.webp">
        </div>
      </div>

      <button class="arrow" onclick="slideRight('web')">&#10095;</button>
    </div>
  </div>
</main>

<!-- MEDIEN -->
<main id="medien">
  <section class="text-section">
    <h3>Portfolio Medien</h3>
  </section>

  <div style="background:#fff; padding:0;">
    <div class="portfolio-slider">
      <button class="arrow" onclick="slideLeft('medien')">&#10094;</button>

      <div class="slider-container" id="container-medien">
        <div class="slider-track">
          <img src="medien/medien1.webp">
          <img src="medien/medien2.webp">
        </div>
      </div>

      <button class="arrow" onclick="slideRight('medien')">&#10095;</button>
    </div>
  </div>
</main>

<script>
function showPage(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('main-header').style.display='flex';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}

function slideLeft(section){
  document.getElementById('container-'+section)
    .scrollBy({left:-300, behavior:'smooth'});
}

function slideRight(section){
  document.getElementById('container-'+section)
    .scrollBy({left:300, behavior:'smooth'});
}
</script>

</body>
</html>
