<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>
<meta name="description" content="Professionelles Grafik-, Print- und Webdesign. Kreative Projekte von Idee bis fertigem Produkt.">
<link rel="icon" href="Bildzeichen.png" type="image/png">

<script>
if (window.location.hash) {
  document.documentElement.classList.add('from-hash');
}
</script>

<style>

/* ====== LOKALE SCHRIFTEN ====== */
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Regular.ttf') format('truetype');
  font-weight: 400;
  font-style: normal;
  font-display: swap;
}

@font-face {
  font-family: 'Ubuntu';
  src: url('fonts/Ubuntu-Medium.ttf') format('truetype');
  font-weight: 500;
  font-style: normal;
  font-display: swap;
}

/* ====== BASISSTILE ====== */
* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family: 'Roboto', sans-serif; 
  color: #000; 
  background-color: #fff; 
}

/* ====== INTRO ====== */
#intro {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  background-color:#fff;
  gap:20px;
  flex-wrap:wrap;
}

/* NEU: TILE SYSTEM */
.tile{
  display:flex;
  flex-direction:column;
  align-items:center;
  cursor:pointer;
}

.dot{
  width:38px;
  height:38px;
  background-color:#98a8cd;
  border-radius:50%;
  margin-bottom:12px;
  transition:all 0.3s ease;
}

.box{
  background-color:#98a8cd;
  color:white;
  font-family:'Ubuntu',sans-serif;
  font-size:1.5rem;
  display:flex;
  justify-content:center;
  align-items:center;
  width:150px;
  height:150px;
  transition:all 0.3s ease;
  text-transform:capitalize;
}

.tile:hover .dot,
.tile:hover .box{
  transform:scale(1.2);
  background-color:#8794b8;
}

/* ====== HEADER / NAV ====== */
header {
  background-color:#ffffff;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px 20px;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  position:sticky;
  top:0;
  z-index:10;
}
.logo img { height:50px; width:auto; margin-bottom:10px; }
nav ul {
  list-style:none;
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
}
nav a {
  text-decoration:none;
  color:#000;
  font-weight:500;
  font-family:'Ubuntu',sans-serif;
  padding:6px 12px;
  transition:all 0.3s ease;
}
nav a:hover, nav a.active { background-color:#98a8cd; color:white; }

/* ====== CONTENT SECTIONS ====== */
main { display:none; padding:0; min-height:100vh; position:relative; }
main.active { display:block; }

/* ====== BLAUER BALKEN MIT TEXT ====== */
.text-section {
  background-color:#98a8cd;
  padding:40px 20px;
  color:white;
  line-height:1.5;
}
.text-section h2 {
  font-family:'Ubuntu',sans-serif;
  font-size:1.8rem;
  text-align:center;
  margin-bottom:30px;
}
.text-section h3 {
  font-family: 'Ubuntu', sans-serif;
  font-size: 0.9rem;
  text-align: center;
  margin-bottom: 30px;
}

/* ====== PORTFOLIO SLIDER ====== */
.portfolio-slider {
  display:flex;
  align-items:center;
  position:relative;
  gap:10px;
  padding:20px 10px;
}
.slider-container { overflow:hidden; flex:1; }
.slider-track { display:flex; gap:20px; scroll-behavior: smooth; cursor: grab; }
.slider-track.active { cursor: grabbing; cursor: -webkit-grabbing; }

.portfolio-slider img,
.portfolio-slider video {
  flex: 0 0 auto;
  width: calc((100% - 40px)/3);
  height: auto;
  object-fit: contain;
  border-radius: 4px;
  transition: transform 0.3s ease;
}

.portfolio-slider img:hover,
.portfolio-slider video:hover {
  transform: scale(1.03);
}

/* ====== Pfeile ====== */
.arrow {
  font-size:2rem;
  background: rgba(0,0,0,0.3);
  color:#fff;
  border:none;
  padding:10px;
  cursor:pointer;
  z-index:5;
  border-radius:0%;
  user-select:none;
}
.arrow:hover { background: rgba(0,0,0,0.6); }

/* ====== KONTAKT ====== */
#kontakt section {
  width:100%;
  background-color:#ffffff;
  padding:40px 20px;
  text-align:center;
  color:#000;
}
#kontakt h2 {
  font-family:'Ubuntu',sans-serif;
  margin-bottom:20px;
  font-size:2rem;
}
#kontakt p {
  margin:10px 0;
  font-size:1rem;
}
#kontakt a {
  color:#98a8cd;
  text-decoration:none;
  font-weight:500;
}
#kontakt a:hover { text-decoration:underline; }

/* ====== MINISPIEL ====== */
#game-container { max-width:90%; margin:0 auto; position:relative; }

/* ====== FOOTER ====== */
#main-footer {
  background-color:#98a8cd;
  padding:15px 20px;
  text-align:center;
  font-size:0.9rem;
  color:white;
  display:none;
}

/* ====== RESPONSIVE ====== */
@media(max-width:1024px){
  .portfolio-slider img { width:calc((100% - 20px)/2); }
}

@media(max-width:768px){
  #intro { flex-direction: column; gap:15px; align-items: center; }
  .portfolio-slider img { width:90%; max-width:400px; }
  .arrow { display:none; }
}

</style>
</head>

<body>

<!-- INTRO (NUR HIER GEÄNDERT) -->
<div id="intro">

  <div class="tile" onclick="showPage('grafik')">
    <div class="dot"></div>
    <div class="box">Grafik</div>
  </div>

  <div class="tile" onclick="showPage('print')">
    <div class="dot"></div>
    <div class="box">Print</div>
  </div>

  <div class="tile" onclick="showPage('web')">
    <div class="dot"></div>
    <div class="box">Web</div>
  </div>

  <div class="tile" onclick="showPage('medien')">
    <div class="dot"></div>
    <div class="box">Medien</div>
  </div>

</div>

<!-- HEADER -->
<header id="main-header" style="display:none;">
  <div class="logo"><img src="logo.png" alt="Website-Logo"></div>
  <nav>
    <ul>
      <li><a href="#" id="nav-grafik" onclick="openPage('grafik')">Grafik</a></li>
      <li><a href="#" id="nav-print" onclick="openPage('print')">Print</a></li>
      <li><a href="#" id="nav-web" onclick="openPage('web')">Web</a></li>
      <li><a href="#" id="nav-medien" onclick="openPage('medien')">Medien</a></li>
      <li><a href="#" id="nav-kontakt" onclick="openPage('kontakt')">Kontakt</a></li>
    </ul>
  </nav>
</header>

<!-- KONTAKT -->
<main id="kontakt">
  <section>
    <h2>Kontakt</h2>
    <p><strong>felbs.design</strong></p>
    <p>Thomas Felber</p>
    <p>Email: <a href="mailto:thomas@felbsdesign.at">thomas@felbsdesign.at</a></p>
  </section>
</main>

<!-- GRAFIK -->
<main id="grafik"></main>

<!-- PRINT -->
<main id="print"></main>

<!-- WEB -->
<main id="web"></main>

<!-- MEDIEN -->
<main id="medien"></main>

<!-- FOOTER -->
<footer id="main-footer">
  &copy; 2026 felbs.design
</footer>

<script>
function showPage(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('main-header').style.display='flex';
  document.getElementById('main-footer').style.display='block';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
