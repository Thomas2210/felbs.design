<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>
<meta name="description" content="Professionelles Grafik-, Print- und Webdesign.">
<link rel="icon" href="Bildzeichen.png" type="image/png">

<style>
/* ===== BASIS ===== */
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Arial,sans-serif;background:#fff;color:#000}

/* ===== INTRO ===== */
#intro{display:flex;justify-content:center;align-items:center;height:100vh;gap:20px;flex-wrap:wrap}
.square{width:140px;height:140px;display:flex;align-items:center;justify-content:center;background:#98a8cd;color:#fff;cursor:pointer;transition:.3s}
.square:hover{transform:scale(1.1)}

/* ===== HEADER ===== */
header{display:none;flex-direction:column;align-items:center;padding:15px;box-shadow:0 2px 8px rgba(0,0,0,.1);position:sticky;top:0;background:#fff}
nav ul{display:flex;gap:15px;list-style:none}
nav a{text-decoration:none;color:#000;padding:6px 10px}
nav a.active,nav a:hover{background:#98a8cd;color:#fff}

/* ===== MAIN ===== */
main{display:none}
main.active{display:block}

/* ===== TEXT ===== */
.text-section{background:#98a8cd;color:#fff;padding:30px;text-align:center}

/* ===== SLIDER ===== */
.slider{display:flex;overflow-x:auto;gap:15px;padding:20px}
.slider img,.slider video{width:300px;border-radius:5px}

/* ===== FOOTER ===== */
footer{display:none;text-align:center;padding:15px;background:#98a8cd;color:#fff}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="square" onclick="openSite('grafik')">Grafik</div>
  <div class="square" onclick="openSite('print')">Print</div>
  <div class="square" onclick="openSite('web')">Web</div>
  <div class="square" onclick="openSite('medien')">Medien</div>
</div>

<!-- HEADER -->
<header id="header">
  <nav>
    <ul>
      <li><a onclick="openPage('grafik')">Grafik</a></li>
      <li><a onclick="openPage('print')">Print</a></li>
      <li><a onclick="openPage('web')">Web</a></li>
      <li><a onclick="openPage('medien')">Medien</a></li>
      <li><a onclick="openPage('kontakt')">Kontakt</a></li>
    </ul>
  </nav>
</header>

<!-- GRAFIK -->
<main id="grafik">
  <div class="text-section">
    <h2>Portfolio Grafik</h2>
  </div>
  <div class="slider">
    <img src="grafik/grafik1.webp">
    <img src="grafik/grafik2.webp">
  </div>
</main>

<!-- PRINT -->
<main id="print">
  <div class="text-section">
    <h2>Portfolio Print</h2>
  </div>
  <div class="slider">
    <img src="print/print1.webp">
  </div>
</main>

<!-- WEB -->
<main id="web">
  <div class="text-section">
    <h2>Portfolio Web</h2>
  </div>
  <div class="slider">
    <img src="web/web1.webp">
  </div>
</main>

<!-- MEDIEN -->
<main id="medien">
  <div class="text-section">
    <h2>Portfolio Medien</h2>
  </div>
  <div class="slider">
    <video autoplay loop muted>
      <source src="medien/video.webm" type="video/webm">
    </video>
  </div>
</main>

<!-- KONTAKT -->
<main id="kontakt">
  <div class="text-section">
    <h2>Kontakt</h2>
    <p>Email: thomas@felbsdesign.at</p>
  </div>
</main>

<footer id="footer">© felbs.design</footer>

<script>
function openSite(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('header').style.display='flex';
  document.getElementById('footer').style.display='block';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m=>m.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
