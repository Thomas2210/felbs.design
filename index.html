<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>felbs.design</title>

<link rel="icon" href="Bildzeichen.png" type="image/png">

<style>

/* ===== RESET ===== */
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* ===== BODY LAYOUT (WICHTIG FIX) ===== */
html, body {
  height: 100%;
}

body {
  font-family: 'Roboto', sans-serif;
  color: #000;
  background: #fff;

  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

/* ===== FONTS ===== */
@font-face {
  font-family: 'Roboto';
  src: url('fonts/Roboto-Regular.ttf') format('truetype');
}

@font-face {
  font-family: 'Ubuntu';
  src: url('fonts/Ubuntu-Medium.ttf') format('truetype');
}

/* ===== INTRO ===== */
#intro {
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  gap:20px;
  flex-wrap:wrap;
}

.square {
  background:#98a8cd;
  color:#fff;
  width:150px;
  height:150px;
  display:flex;
  justify-content:center;
  align-items:center;
  cursor:pointer;
}

/* ===== HEADER ===== */
header {
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:15px 20px;
  position:sticky;
  top:0;
  background:#fff;
  box-shadow:0 2px 8px rgba(0,0,0,0.1);
  z-index:10;
}

/* ===== NAV ===== */
nav ul {
  display:flex;
  gap:20px;
  list-style:none;
}

/* ===== MAIN FIX (WICHTIG) ===== */
main {
  display:none;
  flex:1;              /* <<< DAS ist der Footer-Fix */
  padding:0;
}

main.active {
  display:block;
}

/* ===== TEXT SECTION ===== */
.text-section {
  background:#98a8cd;
  color:#fff;
  padding:40px 20px;
}

/* ===== SLIDER ===== */
.portfolio-slider {
  display:flex;
  align-items:center;
  gap:10px;
}

.slider-container {
  overflow-x:auto;
  flex:1;
}

.slider-track {
  display:flex;
  gap:20px;
}

/* ===== FOOTER FIX (KEIN STICKY!) ===== */
#main-footer {
  background:#98a8cd;
  color:#fff;
  text-align:center;
  padding:15px;
  font-size:0.9rem;

  margin-top:auto;   /* <<< DAS drückt ihn nach unten */
  position: static;  /* <<< wichtig: NICHT sticky/fixed */
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <div class="square" onclick="showPage('grafik')">Grafik</div>
  <div class="square" onclick="showPage('print')">Print</div>
  <div class="square" onclick="showPage('web')">Web</div>
  <div class="square" onclick="showPage('medien')">Medien</div>
</div>

<!-- HEADER -->
<header id="main-header" style="display:none;">
  <div class="logo"><img src="logo.png" height="50"></div>
  <nav>
    <ul>
      <li><a onclick="openPage('grafik')">Grafik</a></li>
      <li><a onclick="openPage('print')">Print</a></li>
      <li><a onclick="openPage('web')">Web</a></li>
      <li><a onclick="openPage('medien')">Medien</a></li>
      <li><a onclick="openPage('kontakt')">Kontakt</a></li>
    </ul>
  </nav>
</header>

<!-- SEITEN -->
<main id="grafik" class="active">
  <section class="text-section">
    <h2>Grafik</h2>
  </section>
</main>

<main id="print">
  <section class="text-section">
    <h2>Print</h2>
  </section>
</main>

<main id="web">
  <section class="text-section">
    <h2>Web</h2>
  </section>
</main>

<main id="medien">
  <section class="text-section">
    <h2>Medien</h2>
  </section>
</main>

<main id="kontakt">
  <section class="text-section">
    <h2>Kontakt</h2>
  </section>
</main>

<!-- FOOTER -->
<footer id="main-footer">
  © 2026 felbs.design
</footer>

<script>
function showPage(page){
  document.getElementById('intro').style.display='none';
  document.getElementById('main-header').style.display='flex';
  openPage(page);
}

function openPage(page){
  document.querySelectorAll('main').forEach(m => m.classList.remove('active'));
  document.getElementById(page).classList.add('active');
}
</script>

</body>
</html>
